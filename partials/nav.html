<header
  x-data="{ open: false, scrolled: false, path: window.location.pathname }"
  @scroll.window="scrolled = window.scrollY > 10"
  :class="scrolled ? 'shadow-brand bg-page/95 backdrop-blur-sm' : 'bg-page'"
  class="sticky top-0 z-50 border-b border-zinc-100 transition-shadow duration-200"
>
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="/index.html" class="flex items-center">
        <img src="/assets/logo.png" alt="BG Sof" class="h-10 w-auto" />
      </a>

      <!-- Desktop nav links -->
      <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-zinc-600">
        <a href="/pricing.html" :class="path === '/pricing.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="transition-colors">Pricing</a>
        <a href="/showrooms.html" :class="path === '/showrooms.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="transition-colors">Showrooms</a>
        <a href="/manufacturers.html" :class="path === '/manufacturers.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="transition-colors">Manufacturers</a>
      </nav>

      <!-- Desktop CTA -->
      <div class="hidden md:flex items-center gap-3">
        <a href="/login.html" class="text-sm font-medium text-zinc-600 hover:text-zinc-900 transition-colors px-3 py-2">
          Log In
        </a>
          <a href="/signup.html" class="text-sm font-medium text-zinc-600 hover:text-zinc-900 transition-colors px-3 py-2">
          Sign Up
        </a>
    

        <a href="/demo.html" class="inline-flex items-center text-sm font-semibold bg-terracotta-600 hover:bg-terracotta-700 text-white px-4 py-2 rounded-md transition-colors">
          Book a Demo
        </a>
      </div>

      <!-- Mobile menu button -->
      <button
        @click="open = !open"
        class="md:hidden p-2 rounded-md text-zinc-500 hover:text-zinc-700 hover:bg-zinc-100 transition-colors"
        :aria-expanded="open"
        aria-label="Toggle menu"
      >
        <!-- Hamburger -->
        <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <!-- Close -->
        <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- Mobile menu -->
  <div
    x-show="open"
    x-cloak
    x-transition:enter="transition ease-out duration-150"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-100"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="md:hidden border-t border-zinc-100 bg-page"
  >
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-1 text-sm font-medium text-zinc-600">
     
      <a href="/pricing.html" @click="open=false" :class="path === '/pricing.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="py-2 transition-colors">Pricing</a>
      <a href="/showrooms.html" @click="open=false" :class="path === '/showrooms.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="py-2 transition-colors">Showrooms</a>
      <a href="/manufacturers.html" @click="open=false" :class="path === '/manufacturers.html' ? 'text-zinc-900 font-semibold' : 'hover:text-zinc-900'" class="py-2 transition-colors">Manufacturers</a>
      
      <div class="pt-3 mt-1 border-t border-zinc-100 flex flex-col gap-2">
        <a href="/login.html"  class="py-2 text-zinc-600 hover:text-zinc-900 transition-colors">Log In</a>
        <a href="/signup.html"  class="py-2 text-zinc-600 hover:text-zinc-900 transition-colors">Sign Up </a>
        <a href="/demo.html" class="inline-flex items-center text-sm font-semibold bg-terracotta-600 hover:bg-terracotta-700 text-white px-4 py-2 rounded-md transition-colors">
          Book a Demo
        </a>
      </div>
    </div>
  </div>

</header>
