<section id="demo" class="bg-zinc-50 py-24 px-4 sm:px-6 lg:px-8">
  <div class="max-w-lg mx-auto text-center">


    <p class="text-zinc-500 mb-8">Fill in your details and our team will reach out to schedule a personalized demo.</p>

    <!-- Form wrapper — HTMX swaps this out on success -->
    <div id="demo-form-wrapper">
      <form
        hx-post="/api/demo"
        hx-target="#demo-form-wrapper"
        hx-swap="innerHTML"
        hx-indicator="#demo-spinner"
        x-data="{ submitted: false }"
        @htmx:response-error.window="$dispatch('demo-error')"
        class="bg-white border border-zinc-200 rounded-2xl p-8 shadow-sm text-left space-y-4"
      >

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1" for="demo-name">Full name</label>
          <input
            id="demo-name" name="name" type="text" placeholder="Jane Smith" required
            class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1" for="demo-email">Work email</label>
          <input
            id="demo-email" name="email" type="email" placeholder="jane@company.com" required
            class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
          />
        </div>

        <!-- Company -->
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1" for="demo-company">Company</label>
          <input
            id="demo-company" name="company" type="text" placeholder="Acme Kitchens" required
            class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
          />
        </div>

        <!-- Role -->
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1" for="demo-role">I am a…</label>
          <select
            id="demo-role" name="role" required
            class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 text-sm text-zinc-900 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition bg-white"
          >
            <option value="" disabled selected>Select one</option>
            <option value="manufacturer">Manufacturer</option>
            <option value="showroom">Showroom</option>
            <option value="designer">Designer</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Error banner (shown on network/server error) -->
        <div
          x-data="{ show: false }"
          @demo-error.window="show = true"
          x-show="show"
          x-cloak
          class="text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"
        >
          Something went wrong. Please try again or email us directly.
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="relative w-full bg-terracotta-600 hover:bg-terracotta-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm shadow-sm mt-2 flex items-center justify-center gap-2"
        >
          <!-- Spinner (shown while HTMX request is in flight) -->
          <span id="demo-spinner" class="htmx-indicator">
            <svg class="animate-spin w-4 h-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
          </span>
          Book My Demo
        </button>

      </form>
    </div>

  </div>
</section>

<!-- HTMX spinner style — hide by default, show during request -->
<style>
  .htmx-indicator { display: none; }
  .htmx-request .htmx-indicator { display: inline-flex; }
</style>
