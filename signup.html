<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – BGsof</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
</head>

<body class="font-sans antialiased bg-page text-charcoal min-h-screen flex flex-col">

  <!-- Nav -->
  <div hx-get="/partials/nav.html" hx-trigger="load" hx-swap="outerHTML"></div>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-extrabold text-zinc-900 mb-1">Create your account</h1>
        <p class="text-sm text-zinc-500">Start for free. No credit card required.</p>
      </div>

      <!-- Card -->
      <div class="bg-white border border-zinc-200 rounded-2xl p-8 shadow-sm">
        <form
          x-data="{ showPassword: false, role: '' }"
          hx-post="/api/signup"
          hx-target="#signup-error"
          hx-swap="innerHTML"
          class="space-y-5"
        >

          <!-- Role selector (shown first to set context) -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-2">I am a…</label>
            <div class="grid grid-cols-2 gap-3">
              <button
                type="button"
                @click="role = 'manufacturer'"
                :class="role === 'manufacturer'
                  ? 'border-terracotta-600 bg-terracotta-50 text-terracotta-700'
                  : 'border-zinc-200 text-zinc-600 hover:border-zinc-300'"
                class="flex flex-col items-center gap-1.5 border-2 rounded-md py-3 px-2 text-sm font-medium transition-colors"
              >
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
                Manufacturer
              </button>
              <button
                type="button"
                @click="role = 'showroom'"
                :class="role === 'showroom'
                  ? 'border-terracotta-600 bg-terracotta-50 text-terracotta-700'
                  : 'border-zinc-200 text-zinc-600 hover:border-zinc-300'"
                class="flex flex-col items-center gap-1.5 border-2 rounded-md py-3 px-2 text-sm font-medium transition-colors"
              >
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                Showroom
              </button>
            </div>
            <!-- Hidden input to carry role value -->
            <input type="hidden" name="role" :value="role" />
          </div>

          <!-- Full name -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1" for="signup-name">Full name</label>
            <input
              id="signup-name" name="name" type="text" placeholder="Jane Smith" required
              class="form-input"
            />
          </div>

          <!-- Company -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1" for="signup-company">Company name</label>
            <input
              id="signup-company" name="company" type="text" placeholder="Acme Kitchens" required
              class="form-input"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1" for="signup-email">Work email</label>
            <input
              id="signup-email" name="email" type="email" placeholder="jane@company.com" required
              class="form-input"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1" for="signup-password">Password</label>
            <div class="relative">
              <input
                id="signup-password" name="password" :type="showPassword ? 'text' : 'password'" placeholder="Min. 8 characters" required minlength="8"
                class="form-input pr-10"
              />
              <button
                type="button"
                @click="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 transition-colors"
              >
                <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Terms -->
          <div class="flex items-start gap-2">
            <input id="terms" name="terms" type="checkbox" required class="mt-0.5 w-4 h-4 rounded border-zinc-300 text-terracotta-600 focus:ring-terracotta-400" />
            <label for="terms" class="text-sm text-zinc-600">
              I agree to the
              <a href="#" class="text-terracotta-600 hover:underline">Terms of Service</a>
              and
              <a href="#" class="text-terracotta-600 hover:underline">Privacy Policy</a>
            </label>
          </div>

          <!-- Error -->
          <div id="signup-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full bg-terracotta-600 hover:bg-terracotta-700 text-white font-semibold py-2.5 rounded-md transition-colors text-sm shadow-sm"
          >
            Create Account
          </button>

        </form>
      </div>

      <!-- Login link -->
      <p class="text-center text-sm text-zinc-500 mt-6">
        Already have an account?
        <a href="/login.html" class="text-terracotta-600 font-medium hover:underline">Log in</a>
      </p>

    </div>
  </main>

  <!-- Footer -->
  <div hx-get="/partials/footer.html" hx-trigger="load" hx-swap="outerHTML"></div>

</body>
</html>
