<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – BG Sof</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind.config.js"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" type="image/png" href="/assets/Bgsof_favicon.png" />
</head>

<body class="font-sans antialiased bg-zinc-50 text-charcoal min-h-screen flex flex-col">

  <!-- Nav -->
  <div hx-get="/partials/nav.html" hx-trigger="load" hx-swap="outerHTML"></div>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">

      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-2xl font-extrabold text-zinc-900 mb-1">Welcome back</h1>
        <p class="text-sm text-zinc-500">Log in to your BG Sof account</p>
      </div>

      <!-- Card -->
      <div class="bg-white border border-zinc-200 rounded-2xl p-8 shadow-sm">
        <form
          hx-post="/api/login"
          hx-target="#login-error"
          hx-swap="innerHTML"
          x-data="{ showPassword: false }"
          class="space-y-5"
        >

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-zinc-700 mb-1" for="login-email">Email</label>
            <input
              id="login-email" name="email" type="email" placeholder="jane@company.com" required
              class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-zinc-700" for="login-password">Password</label>
              <a href="#" class="text-xs text-terracotta-600 hover:underline">Forgot password?</a>
            </div>
            <div class="relative">
              <input
                id="login-password" name="password" :type="showPassword ? 'text' : 'password'" placeholder="••••••••" required
                class="w-full border border-zinc-300 rounded-xl px-4 py-2.5 pr-10 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-terracotta-400 focus:border-transparent transition"
              />
              <!-- Show/hide toggle -->
              <button
                type="button"
                @click="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 transition-colors"
                :aria-label="showPassword ? 'Hide password' : 'Show password'"
              >
                <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember me -->
          <div class="flex items-center gap-2">
            <input id="remember" name="remember" type="checkbox" class="w-4 h-4 rounded border-zinc-300 text-terracotta-600 focus:ring-terracotta-400" />
            <label for="remember" class="text-sm text-zinc-600">Remember me for 30 days</label>
          </div>

          <!-- Error -->
          <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full bg-terracotta-600 hover:bg-terracotta-700 text-white font-semibold py-2.5 rounded-xl transition-colors text-sm shadow-sm"
          >
            Log In
          </button>

        </form>
      </div>

      <!-- Sign up link -->
      <p class="text-center text-sm text-zinc-500 mt-6">
        Don't have an account?
        <a href="/signup.html" class="text-terracotta-600 font-medium hover:underline">Sign up free</a>
      </p>

    </div>
  </main>

  <!-- Footer -->
  <div hx-get="/partials/footer.html" hx-trigger="load" hx-swap="outerHTML"></div>

</body>
</html>
